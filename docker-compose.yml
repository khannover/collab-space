services:
  gateway:
    image: nginx:alpine
    container_name: collab_hub_gateway
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - filebrowser
    environment:
      FRONTEND_HOST: ${FRONTEND_HOST:-app.collab.local}
      API_HOST: ${API_HOST:-api.collab.local}
      FILEBROWSER_HOST: ${FILEBROWSER_HOST:-files.collab.local}
    volumes:
      - ./proxy/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "${GATEWAY_PORT:-80}:80"

  backend:
    build: ./backend
    container_name: collab_hub_backend
    restart: unless-stopped
    environment:
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://app.collab.local}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://api.collab.local}
      DATA_ROOT: /data
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://api.collab.local/api/auth/discord/callback}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
    volumes:
      - ./backend-data:/data
    expose:
      - "3001"

  # The Custom React Interface we built
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${PUBLIC_API_URL:-http://api.collab.local}
    container_name: collab_hub_frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  # The heavy-lifting file manager / backend API
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: collab_hub_files
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./backend-data/files:/srv
      - ./backend-data/database/filebrowser.db:/database/filebrowser.db
      - ./backend-data/config/settings.json:/config/settings.json
